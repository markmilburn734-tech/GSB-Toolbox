<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSB Tool Box</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
     tailwind.config = {
         theme: {
           extend: {
             colors: {
                'brand': '#573960', 'brand2': '#573960',
                'brand3': '#ff3154', 'brand4': '#ff3154',
                'brand5': '#ff3154', 'brand6': '#816a88',
             }
           }
         }
      }
    </script>

    <!-- Styles[cite: 4] -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        .input-no-spinner::-webkit-inner-spin-button,
        .input-no-spinner::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        @keyframes pulse-subtle { 0%, 100% { opacity: 1; } 50% { opacity: 0.85; } }
        .animate-pulse-subtle { animation: pulse-subtle 2s infinite; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-900 font-sans">
    <!-- React renders here[cite: 4] -->
    <div id="root"></div>

    <!-- Entry Point for Modular React -->
    <script type="module" src="src/main.jsx"></script>
</body>
</html>
